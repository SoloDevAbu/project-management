services:

  postgres:
    # Optional local PostgreSQL for development: enable with --profile local-db
    image: postgres:16-alpine
    container_name: pm_postgres
    profiles:
      - local-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: pm_migrate
    restart: "no"
    env_file:
      - .env
    # Allows containers to reach host DB on Linux via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: npx prisma migrate deploy

  app:
    build:
      context: .
      target: runner
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: pm_next_app
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    # Allows containers to reach host DB on Linux via host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "7751:7751"

volumes:
  postgres_data:
